<style>

<script>
(function () {
'use strict';

/* ================================================================
   GPU fluid simulation (Stable Fluids) + Beer–Lambert ink rendering
   ================================================================ */

var canvas = document.getElementById('c');
var gl = canvas.getContext('webgl2', { alpha: false, depth: false, stencil: false, antialias: false });
if (!gl || !gl.getExtension('EXT_color_buffer_float')) {
  document.getElementById('nogl').style.display = 'flex';
  return;
}

var config = {
  SIM_RESOLUTION: 144,
  DYE_RESOLUTION: 560,
  VELOCITY_DISSIPATION: 0.3,
  DENSITY_DISSIPATION: 0.06,
  PRESSURE_DECAY: 0.8,
  PRESSURE_ITERATIONS: 20,
  CURL: 21,
  SPLAT_FORCE: 3600,
  PAPER: [0.941, 0.925, 0.882]   // #f0ece1
};

/* ---------- shaders ---------- */

var VERT = [
  '#version 300 es',
  'precision highp float;',
  'in vec2 aPosition;',
  'out vec2 vUv;',
  'void main(){ vUv = aPosition*0.5+0.5; gl_Position = vec4(aPosition,0.,1.); }'
].join('\n');

function frag(body) {
  return [
    '#version 300 es',
    'precision highp float;',
    'precision highp sampler2D;',
    'in vec2 vUv;',
    'out vec4 fragColor;',
    body
  ].join('\n');
}

var SHADERS = {
  splat: frag([
    'uniform sampler2D uTarget;',
    'uniform float aspectRatio;',
    'uniform vec3 color;',
    'uniform vec2 point;',
    'uniform float radius;',
    'void main(){',
    '  vec2 p = vUv - point;',
    '  p.x *= aspectRatio;',
    '  vec3 splat = exp(-dot(p,p)/radius) * color;',
    '  vec3 base = texture(uTarget, vUv).xyz;',
    '  fragColor = vec4(base + splat, 1.0);',
    '}'
  ].join('\n')),

  advection: frag([
    'uniform sampler2D uVelocity;',
    'uniform sampler2D uSource;',
    'uniform vec2 texelSize;',
    'uniform float dt;',
    'uniform float dissipation;',
    'void main(){',
    '  vec2 coord = vUv - dt * texture(uVelocity, vUv).xy * texelSize;',
    '  vec4 result = texture(uSource, coord);',
    '  float decay = 1.0 + dissipation * dt;',
    '  fragColor = result / decay;',
    '}'
  ].join('\n')),

  divergence: frag([
    'uniform sampler2D uVelocity;',
    'uniform vec2 texelSize;',
    'void main(){',
    '  float L = texture(uVelocity, vUv - vec2(texelSize.x, 0.)).x;',
    '  float R = texture(uVelocity, vUv + vec2(texelSize.x, 0.)).x;',
    '  float B = texture(uVelocity, vUv - vec2(0., texelSize.y)).y;',
    '  float T = texture(uVelocity, vUv + vec2(0., texelSize.y)).y;',
    '  float div = 0.5 * (R - L + T - B);',
    '  fragColor = vec4(div, 0., 0., 1.);',
    '}'
  ].join('\n')),

  curl: frag([
    'uniform sampler2D uVelocity;',
    'uniform vec2 texelSize;',
    'void main(){',
    '  float L = texture(uVelocity, vUv - vec2(texelSize.x, 0.)).y;',
    '  float R = texture(uVelocity, vUv + vec2(texelSize.x, 0.)).y;',
    '  float B = texture(uVelocity, vUv - vec2(0., texelSize.y)).x;',
    '  float T = texture(uVelocity, vUv + vec2(0., texelSize.y)).x;',
    '  float vorticity = R - L - T + B;',
    '  fragColor = vec4(0.5 * vorticity, 0., 0., 1.);',
    '}'
  ].join('\n')),

  vorticity: frag([
    'uniform sampler2D uVelocity;',
    'uniform sampler2D uCurl;',
    'uniform vec2 texelSize;',
    'uniform float curl;',
    'uniform float dt;',
    'void main(){',
    '  float L = texture(uCurl, vUv - vec2(texelSize.x, 0.)).x;',
    '  float R = texture(uCurl, vUv + vec2(texelSize.x, 0.)).x;',
    '  float B = texture(uCurl, vUv - vec2(0., texelSize.y)).x;',
    '  float T = texture(uCurl, vUv + vec2(0., texelSize.y)).x;',
    '  float C = texture(uCurl, vUv).x;',
    '  vec2 force = 0.5 * vec2(abs(T) - abs(B), abs(R) - abs(L));',
    '  force /= length(force) + 0.0001;',
    '  force *= curl * C;',
    '  force.y *= -1.0;',
    '  vec2 velocity = texture(uVelocity, vUv).xy;',
    '  velocity += force * dt;',
    '  velocity = clamp(velocity, vec2(-1000.), vec2(1000.));',
    '  fragColor = vec4(velocity, 0., 1.);',
    '}'
  ].join('\n')),

  pressure: frag([
    'uniform sampler2D uPressure;',
    'uniform sampler2D uDivergence;',
    'uniform vec2 texelSize;',
    'void main(){',
    '  float L = texture(uPressure, vUv - vec2(texelSize.x, 0.)).x;',
    '  float R = texture(uPressure, vUv + vec2(texelSize.x, 0.)).x;',
    '  float B = texture(uPressure, vUv - vec2(0., texelSize.y)).x;',
    '  float T = texture(uPressure, vUv + vec2(0., texelSize.y)).x;',
    '  float divergence = texture(uDivergence, vUv).x;',
    '  float pressure = (L + R + B + T - divergence) * 0.25;',
    '  fragColor = vec4(pressure, 0., 0., 1.);',
    '}'
  ].join('\n')),

  gradientSubtract: frag([
    'uniform sampler2D uPressure;',
    'uniform sampler2D uVelocity;',
    'uniform vec2 texelSize;',
    'void main(){',
    '  float L = texture(uPressure, vUv - vec2(texelSize.x, 0.)).x;',
    '  float R = texture(uPressure, vUv + vec2(texelSize.x, 0.)).x;',
    '  float B = texture(uPressure, vUv - vec2(0., texelSize.y)).x;',
    '  float T = texture(uPressure, vUv + vec2(0., texelSize.y)).x;',
    '  vec2 velocity = texture(uVelocity, vUv).xy;',
    '  velocity -= 0.5 * vec2(R - L, T - B);',
    '  fragColor = vec4(velocity, 0., 1.);',
    '}'
  ].join('\n')),

  fade: frag([
    'uniform sampler2D uTexture;',
    'uniform float uFactor;',
    'void main(){ fragColor = texture(uTexture, vUv) * uFactor; }'
  ].join('\n')),

  display: frag([
    'uniform sampler2D uDye;',
    'uniform vec3 uPaper;',
    'void main(){',
    '  vec3 absorb = texture(uDye, vUv).rgb;',
    // Beer–Lambert absorption: ink soaks light out of the paper
    '  vec3 col = uPaper * exp(-absorb * 1.15);',
    '  fragColor = vec4(col, 1.0);',
    '}'
  ].join('\n'))
};

/* ---------- GL plumbing ---------- */

function compile(type, src) {
  var s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    throw new Error(gl.getShaderInfoLog(s));
  }
  return s;
}

var quadVS = compile(gl.VERTEX_SHADER, VERT);

function Program(fsSrc) {
  this.prog = gl.createProgram();
  gl.attachShader(this.prog, quadVS);
  gl.attachShader(this.prog, compile(gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(this.prog);
  if (!gl.getProgramParameter(this.prog, gl.LINK_STATUS)) {
    throw new Error(gl.getProgramInfoLog(this.prog));
  }
  this.u = {};
  var n = gl.getProgramParameter(this.prog, gl.ACTIVE_UNIFORMS);
  for (var i = 0; i < n; i++) {
    var name = gl.getActiveUniform(this.prog, i).name;
    this.u[name] = gl.getUniformLocation(this.prog, name);
  }
}
Program.prototype.bind = function () { gl.useProgram(this.prog); };

var programs = {
  splat: new Program(SHADERS.splat),
  advection: new Program(SHADERS.advection),
  divergence: new Program(SHADERS.divergence),
  curl: new Program(SHADERS.curl),
  vorticity: new Program(SHADERS.vorticity),
  pressure: new Program(SHADERS.pressure),
  gradientSubtract: new Program(SHADERS.gradientSubtract),
  fade: new Program(SHADERS.fade),
  display: new Program(SHADERS.display)
};

// fullscreen quad
var vao = gl.createVertexArray();
gl.bindVertexArray(vao);
var vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

function blit(target) {
  if (target == null) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
  } else {
    gl.bindFramebuffer(gl.FRAMEBUFFER, target.fbo);
    gl.viewport(0, 0, target.width, target.height);
  }
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function createFBO(w, h) {
  var tex = gl.createTexture();
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null);
  var fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  return {
    tex: tex, fbo: fbo, width: w, height: h,
    texel: [1 / w, 1 / h],
    attach: function (unit) {
      gl.activeTexture(gl.TEXTURE0 + unit);
      gl.bindTexture(gl.TEXTURE_2D, this.tex);
      return unit;
    }
  };
}

function createDoubleFBO(w, h) {
  return {
    read: createFBO(w, h),
    write: createFBO(w, h),
    width: w, height: h,
    texel: [1 / w, 1 / h],
    swap: function () { var t = this.read; this.read = this.write; this.write = t; }
  };
}

var velocity, dye, divergenceFBO, curlFBO, pressureFBO;

function initFramebuffers() {
  var aspect = canvas.width / canvas.height;
  var simH = config.SIM_RESOLUTION;
  var simW = Math.round(simH * aspect);
  var dyeH = config.DYE_RESOLUTION;
  var dyeW = Math.round(dyeH * aspect);
  velocity = createDoubleFBO(simW, simH);
  dye = createDoubleFBO(dyeW, dyeH);
  divergenceFBO = createFBO(simW, simH);
  curlFBO = createFBO(simW, simH);
  pressureFBO = createDoubleFBO(simW, simH);
}

function resize() {
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var w = Math.floor(window.innerWidth * dpr);
  var h = Math.floor(window.innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
    initFramebuffers();
  }
}
window.addEventListener('resize', resize);

/* ---------- simulation steps ---------- */

function splat(x, y, dx, dy, color, radius) {
  // velocity
  programs.splat.bind();
  gl.uniform1i(programs.splat.u.uTarget, velocity.read.attach(0));
  gl.uniform1f(programs.splat.u.aspectRatio, canvas.width / canvas.height);
  gl.uniform2f(programs.splat.u.point, x, y);
  gl.uniform3f(programs.splat.u.color, dx, dy, 0);
  gl.uniform1f(programs.splat.u.radius, radius / 100);
  blit(velocity.write);
  velocity.swap();
  // dye
  gl.uniform1i(programs.splat.u.uTarget, dye.read.attach(0));
  gl.uniform3f(programs.splat.u.color, color[0], color[1], color[2]);
  blit(dye.write);
  dye.swap();
}

var washing = 0;

function step(dt) {
  gl.disable(gl.BLEND);

  // vorticity confinement
  programs.curl.bind();
  gl.uniform2f(programs.curl.u.texelSize, velocity.texel[0], velocity.texel[1]);
  gl.uniform1i(programs.curl.u.uVelocity, velocity.read.attach(0));
  blit(curlFBO);

  programs.vorticity.bind();
  gl.uniform2f(programs.vorticity.u.texelSize, velocity.texel[0], velocity.texel[1]);
  gl.uniform1i(programs.vorticity.u.uVelocity, velocity.read.attach(0));
  gl.uniform1i(programs.vorticity.u.uCurl, curlFBO.attach(1));
  gl.uniform1f(programs.vorticity.u.curl, config.CURL);
  gl.uniform1f(programs.vorticity.u.dt, dt);
  blit(velocity.write);
  velocity.swap();

  // pressure projection
  programs.divergence.bind();
  gl.uniform2f(programs.divergence.u.texelSize, velocity.texel[0], velocity.texel[1]);
  gl.uniform1i(programs.divergence.u.uVelocity, velocity.read.attach(0));
  blit(divergenceFBO);

  programs.fade.bind();
  gl.uniform1i(programs.fade.u.uTexture, pressureFBO.read.attach(0));
  gl.uniform1f(programs.fade.u.uFactor, config.PRESSURE_DECAY);
  blit(pressureFBO.write);
  pressureFBO.swap();

  programs.pressure.bind();
  gl.uniform2f(programs.pressure.u.texelSize, velocity.texel[0], velocity.texel[1]);
  gl.uniform1i(programs.pressure.u.uDivergence, divergenceFBO.attach(0));
  for (var i = 0; i < config.PRESSURE_ITERATIONS; i++) {
    gl.uniform1i(programs.pressure.u.uPressure, pressureFBO.read.attach(1));
    blit(pressureFBO.write);
    pressureFBO.swap();
  }

  programs.gradientSubtract.bind();
  gl.uniform2f(programs.gradientSubtract.u.texelSize, velocity.texel[0], velocity.texel[1]);
  gl.uniform1i(programs.gradientSubtract.u.uPressure, pressureFBO.read.attach(0));
  gl.uniform1i(programs.gradientSubtract.u.uVelocity, velocity.read.attach(1));
  blit(velocity.write);
  velocity.swap();

  // advect velocity
  programs.advection.bind();
  gl.uniform2f(programs.advection.u.texelSize, velocity.texel[0], velocity.texel[1]);
  gl.uniform1i(programs.advection.u.uVelocity, velocity.read.attach(0));
  gl.uniform1i(programs.advection.u.uSource, velocity.read.attach(0));
  gl.uniform1f(programs.advection.u.dt, dt);
  gl.uniform1f(programs.advection.u.dissipation, config.VELOCITY_DISSIPATION);
  blit(velocity.write);
  velocity.swap();

  // advect dye
  gl.uniform1i(programs.advection.u.uVelocity, velocity.read.attach(0));
  gl.uniform1i(programs.advection.u.uSource, dye.read.attach(1));
  gl.uniform1f(programs.advection.u.dissipation, config.DENSITY_DISSIPATION);
  blit(dye.write);
  dye.swap();

  // wash away (洗い流す)
  if (washing > 0) {
    washing--;
    programs.fade.bind();
    gl.uniform1i(programs.fade.u.uTexture, dye.read.attach(0));
    gl.uniform1f(programs.fade.u.uFactor, 0.93);
    blit(dye.write);
    dye.swap();
  }
}

function render() {
  programs.display.bind();
  gl.uniform1i(programs.display.u.uDye, dye.read.attach(0));
  gl.uniform3f(programs.display.u.uPaper, config.PAPER[0], config.PAPER[1], config.PAPER[2]);
  blit(null);
}

/* ---------- inks ---------- */

// absorption = 1 - inkRGB  (what the ink soaks out of the paper)
var INKS = {
  sumi:     [0.86, 0.86, 0.83],   // 墨  black   #23232b
  ai:       [0.85, 0.61, 0.08],   // 藍  blue    #2563eb
  sora:     [0.98, 0.29, 0.17],   // 空  cyan    #06b6d4
  midori:   [0.91, 0.40, 0.55],   // 緑  green   #169873
  ki:       [0.08, 0.30, 0.97],   // 黄  yellow  #eab308
  dai:      [0.02, 0.55, 0.91],   // 橙  orange  #f97316
  beni:     [0.15, 0.69, 0.74],   // 紅  red     #d94f43
  momo:     [0.08, 0.72, 0.40],   // 桃  pink    #ec4899
  murasaki: [0.51, 0.77, 0.07],   // 紫  purple  #7c3aed
  cha:      [0.43, 0.75, 0.95]    // 茶  brown   #92400e
};
var inkNames = Object.keys(INKS);
var currentInk = 'sumi';

function inkColor(scale) {
  var name = currentInk === 'mix'
    ? inkNames[Math.floor(Math.random() * inkNames.length)]
    : currentInk;
  var a = INKS[name];
  return [a[0] * scale, a[1] * scale, a[2] * scale];
}

/* ---------- interaction ---------- */

var pointer = { down: false, moved: false, x: 0, y: 0, px: 0, py: 0 };

function uv(e) {
  var t = (e.touches && e.touches.length) ? e.touches[0] : e;
  return [t.clientX / window.innerWidth, 1 - t.clientY / window.innerHeight];
}

function bloom(x, y) {
  // a breathing ink drop: dye cloud + a faint swirl so it keeps dissolving
  splat(x, y, 0, 0, inkColor(0.55), 1.6);
  var a0 = Math.random() * Math.PI * 2;
  for (var i = 0; i < 4; i++) {
    var a = a0 + (i / 4) * Math.PI * 2;
    var ox = Math.cos(a) * 0.012, oy = Math.sin(a) * 0.012;
    // tangential push → slow rotation, like ink meeting moving water
    splat(x + ox, y + oy, -oy * config.SPLAT_FORCE * 0.1, ox * config.SPLAT_FORCE * 0.1, [0, 0, 0], 0.9);
  }
}

function down(e) {
  if (e.target !== canvas) return;
  var p = uv(e);
  pointer.down = true;
  pointer.moved = false;
  pointer.x = pointer.px = p[0];
  pointer.y = pointer.py = p[1];
  e.preventDefault();
}

function move(e) {
  if (!pointer.down) return;
  var p = uv(e);
  pointer.px = pointer.x; pointer.py = pointer.y;
  pointer.x = p[0]; pointer.y = p[1];
  var dx = pointer.x - pointer.px;
  var dy = pointer.y - pointer.py;
  if (Math.abs(dx) + Math.abs(dy) > 0.0005) {
    pointer.moved = true;
    splat(pointer.x, pointer.y,
          dx * config.SPLAT_FORCE, dy * config.SPLAT_FORCE,
          inkColor(0.22), 0.45);
  }
  e.preventDefault();
}

function up(e) {
  if (!pointer.down) return;
  pointer.down = false;
  if (!pointer.moved) bloom(pointer.x, pointer.y);
  e.preventDefault();
}

canvas.addEventListener('mousedown', down);
window.addEventListener('mousemove', move);
window.addEventListener('mouseup', up);
canvas.addEventListener('touchstart', down, { passive: false });
window.addEventListener('touchmove', move, { passive: false });
window.addEventListener('touchend', up, { passive: false });

/* ---------- flow speed slider (流速) ---------- */

function lerp(a, b, t) { return a + (b - a) * t; }

function applyFlow(v) {
  var t = v / 100;   // 0 = still water, 1 = lively current
  config.VELOCITY_DISSIPATION = lerp(0.9, 0.04, t);
  config.SPLAT_FORCE = lerp(1800, 6500, t);
  config.CURL = lerp(14, 32, t);
}

var flowSlider = document.getElementById('flow');
applyFlow(parseFloat(flowSlider.value));
flowSlider.addEventListener('input', function () {
  applyFlow(parseFloat(this.value));
});

/* ---------- auto performance (自動演出) ---------- */

var autoOn = false;
var autoBtn = document.getElementById('auto');
autoBtn.addEventListener('click', function () {
  autoOn = !autoOn;
  autoBtn.classList.toggle('on', autoOn);
});

var wander = { x: 0.5, y: 0.5 };
setInterval(function () {
  if (!autoOn || document.hidden) return;
  wander.x += (Math.random() - 0.5) * 0.3;
  wander.y += (Math.random() - 0.5) * 0.3;
  wander.x = Math.min(0.82, Math.max(0.18, wander.x));
  wander.y = Math.min(0.8, Math.max(0.2, wander.y));
  bloom(wander.x, wander.y);
}, 2300);

/* ---------- wash button (洗い流す) ---------- */

document.getElementById('wash').addEventListener('click', function () {
  washing = 110;   // ~2s of gentle fading
});

/* ---------- ink swatches ---------- */

var dots = document.querySelectorAll('.dot');
dots.forEach(function (d) {
  d.addEventListener('click', function () {
    dots.forEach(function (x) { x.classList.remove('sel'); });
    d.classList.add('sel');
    currentInk = d.dataset.ink;
  });
});

/* ---------- main loop ---------- */

resize();
// opening scene: a few quiet drops in the middle
bloom(0.5, 0.55);
bloom(0.46, 0.5);
bloom(0.56, 0.48);

var last = performance.now();
function frame(now) {
  var dt = Math.min((now - last) / 1000, 0.0166);
  last = now;
  if (!document.hidden) {
    step(dt);
    render();
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

})();
</script>
</body>
</html>
